<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Movie Generator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  margin: 0;
}

.container {
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  max-width: 700px;
  margin: 60px auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  opacity: 0.7;
  margin-bottom: 20px;
  font-size: 13px;
}

textarea {
  width: 100%;
  height: 140px;
  border-radius: 12px;
  padding: 12px;
  border: none;
  resize: none;
  outline: none;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  padding: 14px;
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.status {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.85;
}

.scene {
  margin-top: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

.scene a {
  color: #60a5fa;
  text-decoration: none;
}

.footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎬 AI Movie Generator</h1>
  <div class="subtitle">Turn text into faceless AI video scenes</div>

  <textarea id="textInput" placeholder="Type your story..."></textarea>

  <button id="generateBtn" onclick="generateMovie()">🚀 Generate Movie</button>

  <div class="status" id="status">Ready</div>

  <div id="scenes"></div>

  <div class="footer">Powered by Railway Backend + Pexels API</div>
</div>

<script>
async function generateMovie() {
  const text = document.getElementById("textInput").value.trim();

  if (!text) {
    alert("Please enter some text");
    return;
  }

  const status = document.getElementById("status");
  const btn = document.getElementById("generateBtn");
  const scenesDiv = document.getElementById("scenes");

  btn.disabled = true;
  status.innerText = "⏳ Generating scenes...";
  scenesDiv.innerHTML = "";

  try {
    const response = await fetch("https://ai-movie-backend-production.up.railway.app/generate-video", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    console.log("Backend response:", data);

    if (!response.ok) {
      throw new Error(data.error || "Backend error");
    }

    if (!data.scenes || !Array.isArray(data.scenes)) {
      throw new Error("Invalid response from server");
    }

    status.innerText = "✅ Scenes Generated";

    data.scenes.forEach((scene, i) => {
      const div = document.createElement("div");
      div.className = "scene";

      div.innerHTML = `
        <b>Scene ${i + 1}</b><br><br>
        ${scene.text}<br><br>
        <small>Keyword: ${scene.keyword}</small><br><br>
        ${scene.video
          ? `<a href="${scene.video}" target="_blank">▶ Watch Video</a>`
          : "No video found"}
      `;

      scenesDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Error generating movie";
  }

  btn.disabled = false;
}
</script>

</body>
</html>
