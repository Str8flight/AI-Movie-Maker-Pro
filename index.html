<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text → Movie Generator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  margin: 0;
}

.container {
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  max-width: 650px;
  margin: 60px auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
}

textarea {
  width: 100%;
  height: 140px;
  border-radius: 12px;
  padding: 12px;
  border: none;
  resize: none;
  outline: none;
  margin-bottom: 15px;
}

button {
  padding: 14px;
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-size: 16px;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.status {
  text-align: center;
  margin-top: 15px;
}

video {
  width: 100%;
  margin-top: 20px;
  border-radius: 12px;
  display: none;
}

.scene {
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎬 AI Movie Generator</h1>

  <textarea id="textInput" placeholder="Type your story..."></textarea>

  <button id="generateBtn" onclick="generateMovie()">🚀 Generate Movie</button>

  <div class="status" id="status">Ready</div>

  <div id="scenes"></div>
</div>

<script>
async function generateMovie() {
  const text = document.getElementById("textInput").value.trim();

  if (!text) {
    alert("Please enter text");
    return;
  }

  const status = document.getElementById("status");
  const btn = document.getElementById("generateBtn");
  const scenesDiv = document.getElementById("scenes");

  btn.disabled = true;
  status.innerText = "⏳ Generating scenes...";
  scenesDiv.innerHTML = "";

  try {
    const response = await fetch("https://ai-movie-backend-production.up.railway.app/generate-video", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error || "Backend error");

    if (!data.scenes) throw new Error("No scenes returned");

    status.innerText = "✅ Scenes Generated";

    data.scenes.forEach((s, i) => {
      const div = document.createElement("div");
      div.className = "scene";
      div.innerHTML = `
        <b>Scene ${i + 1}</b><br>
        ${s.text}<br>
        <small>Keyword: ${s.keyword}</small><br>
        <a href="${s.video}" target="_blank">▶ Watch Video</a>
      `;
      scenesDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Error generating movie";
  }

  btn.disabled = false;
}
</script>

</body>
</html>
